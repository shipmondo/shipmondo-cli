name: release

# Cross-compiles static binaries for every supported platform and publishes
# them to a GitHub Release whenever a v* tag is pushed. The binary names match
# what install.sh / install.ps1 / `shipmondo update` expect.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )
          for t in "${targets[@]}"; do
            read -r os arch <<< "$t"
            out="dist/shipmondo-${os}-${arch}"
            if [ "$os" = "windows" ]; then out="${out}.exe"; fi
            echo "Building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" .
          done
          ls -lh dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
